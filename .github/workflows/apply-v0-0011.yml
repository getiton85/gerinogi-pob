name: apply v0.0011 patch

on:
  push:
    paths:
      - '.github/workflows/apply-v0-0011.yml'
      - 'codex-patches/v0_0011.patch'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    if: github.actor == 'getiton85'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Apply patch
        run: |
          git apply --check codex-patches/v0_0011.patch
          git apply codex-patches/v0_0011.patch
      - name: Remove temporary patch workflow
        run: |
          rm -f codex-patches/v0_0011.patch
          rmdir codex-patches 2>/dev/null || true
          rm -f .github/workflows/apply-v0-0011.yml
      - name: Commit applied update
        run: |
          git add -A
          git status --short
          git commit -m "refine rune comparison display v0.0011"
          git push
